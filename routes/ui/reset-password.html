<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝒜lignn — New Password</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <div>
      <a class="brandLink" href="./login.html">
        <div class="brand">𝒜lignn</div>
      </a>
      <div class="tagline">A place for you</div>
    </div>
  </header>

  <main class="container">
    <section class="card" style="max-width: 520px; margin: 40px auto;">
      <h1 class="title">Choose a new password</h1>
      <p class="subtitle">Enter your new password below.</p>

      <form id="resetPasswordForm">
        <div class="checkinSection">
          <label class="label" for="newPasswordInput">New Password</label>
          <input
            id="newPasswordInput"
            class="input"
            type="password"
            name="newPassword"
            autocomplete="new-password"
            placeholder="Enter a new password"
            required
          />
        </div>

        <div class="loginActions">
          <button id="resetPasswordBtn" class="primary" type="submit">Reset Password</button>
        </div>
      </form>

      <div id="resetPasswordStatus" class="status muted">Status: idle</div>
    </section>
  </main>

  <script src="./reset-password.js"></script>
</body>
</html>
