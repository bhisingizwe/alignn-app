<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>𝒜lignn — Forgot Password</title>

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <header class="header">
  <div>
    <a class="brandLink" href="./login.html">
      <div class="brand">𝒜lignn</div>
    </a>
    <div class="tagline">A place for you</div>
  </div>
</header>

  <main class="container">

    <section class="card auth-card">

      <h1 class="title">Reset Your Password</h1>

      <p class="subtitle">
        Enter your email and we’ll generate a reset link.
      </p>

      <a
  id="forgotBackBtn"
  href="./dashboard.html"
  class="back-dashboard-link hidden"
>
  ← Back to Dashboard
</a>

<p id="forgotLoginSwitch" class="auth-switch">
  Remember your password?
  <a href="./login.html">Log In</a>
</p>

      <form id="forgotPasswordForm">

        <div class="checkinSection">
          <label class="label" for="forgotEmailInput">Email</label>

          <input
            id="forgotEmailInput"
            class="input"
            type="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="loginActions">
          <button
            id="sendResetBtn"
            class="primary"
            type="submit"
          >
            Send Reset Link
          </button>
        </div>

      </form>

      <div id="forgotPasswordStatus" class="status muted"></div>

      <div
        id="resetLinkBox"
        class="muted small reset-link-box"
      ></div>

      <footer class="auth-footer">
        <p class="terms-text">
          By continuing, you agree to our
          <a href="./terms.html">Terms</a>
          and acknowledge our
          <a href="./privacy.html">Privacy Policy</a>.
        </p>
      </footer>

    </section>

  </main>

  <footer class="app-footer">
    <div class="footer-links">
      <a href="./about.html" class="footer-link">About</a>
      <a href="./contact.html" class="footer-link">Contact</a>
      <a href="./crisis-support.html" class="footer-link">Crisis Support</a>
    </div>
  </footer>

  <script src="./forgot-password.js"></script>

</body>
</html>
