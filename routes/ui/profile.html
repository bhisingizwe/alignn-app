<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝒜lignn — Profile</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div class="soul-bg">
  <img class="soul-bg-image" src="./backgrounds/profile.jpg" alt="">
  <div class="soul-bg-overlay"></div>
</div>

  <header class="header dashboard-topbar">
    <div>
      <a class="brandLink" href="./dashboard.html">
        <div class="brand">𝒜lignn</div>
      </a>
      <div class="tagline">A place for you</div>
    </div>
  </header>

  <main class="mood-shell">
    <aside class="mood-left-panel">
      <a href="./dashboard.html" class="back-dashboard-link">← Back to Dashboard</a>
    </aside>

    <section class="mood-center-panel">
      <div class="mood-page-header">
        <h1>Profile</h1>
        <p>Manage your account details and preferences.</p>
      </div>

      <section class="mood-form-card">
        <div class="profile-option-card">
  <div class="profile-option-icon">🔒</div>

  <div>
    <h2>Change Password</h2>
    <p>Update your password without leaving your account.</p>

    <div class="password-change-box">
      <label for="currentPasswordInput" class="label">Current password</label>
      <input
        id="currentPasswordInput"
        class="input"
        type="password"
        placeholder="Enter current password"
      />

      <label for="newProfilePasswordInput" class="label">New password</label>
      <input
        id="newProfilePasswordInput"
        class="input"
        type="password"
        placeholder="Enter new password"
      />

      <label for="confirmPasswordInput" class="label">Confirm new password</label>
      <input
        id="confirmPasswordInput"
        class="input"
        type="password"
        placeholder="Confirm new password"
      />

      <button id="changePasswordBtn" class="primary profile-action-btn" type="button">
        Update Password
      </button>
    </div>
  </div>
</div>

        <div id="profileStatus" class="status muted">Status: idle</div>
      </section>
    </section>

    <aside class="app-right-panel">
      <a class="dashboard-icon-link" href="./dashboard.html">
        <span class="dashboard-icon-circle">⌂</span>
        <span>Home</span>
      </a>

      <a class="dashboard-icon-link" href="./mood.html">
        <span class="dashboard-icon-circle">✦</span>
        <span>Mood</span>
      </a>

      <a class="dashboard-icon-link" href="./checkin.html">
        <span class="dashboard-icon-circle">☾</span>
        <span>Check-In</span>
      </a>

      <a class="dashboard-icon-link" href="./journal.html">
        <span class="dashboard-icon-circle">✎</span>
        <span>Journal</span>
      </a>

      <a class="dashboard-icon-link" href="./reflection.html">
        <span class="dashboard-icon-circle">◎</span>
        <span>Reflection</span>
      </a>

      <a class="dashboard-icon-link active" href="./profile.html">
        <span class="dashboard-icon-circle">◯</span>
        <span>Profile</span>
      </a>

      <a class="dashboard-icon-link" href="./history.html">
        <span class="dashboard-icon-circle">⌛</span>
        <span>History</span>
      </a>

      <button id="logoutBtnSide" class="dashboard-side-logout">Log out</button>
    </aside>
  </main>

  <footer class="app-footer">
    <div class="footer-links">
      <a href="about.html" class="footer-link">About</a>
      <a href="contact.html" class="footer-link">Contact</a>
      <a href="crisis-support.html" class="footer-link">Crisis support</a>
    </div>
  </footer>
  
<script src="./auth.js"></script>
<script src="./profile.js"></script>
</body>
</html>
